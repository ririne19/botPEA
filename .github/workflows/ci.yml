name: CI

on:
  push:
    branches: ["**"]        # tous les pushs sur toutes les branches
  pull_request:
    branches: [develop, main]   # toutes les PRs vers develop ou main

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint         # les tests ne tournent que si le lint passe
    env:
      TELEGRAM_BOT_TOKEN: "fake_token_for_tests"
      GROQ_API_KEY: "fake_groq_key"
      NOTION_API_KEY: "fake_notion_key"
      FINNHUB_API_KEY: "fake_finnhub_key"
      EODHD_API_KEY: "fake_eodhd_key"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v